name: Reusable publish and release

on:
  workflow_call:
    inputs:
      version_prefix:
        description: "Prefix used for version tags"
        required: false
        type: string
        default: "v"
      image_name:
        description: "GHCR image name"
        required: false
        type: string
        default: ${{ github.repository }}
    secrets: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute version
        id: vars
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          prefix="${{ inputs.version_prefix }}"
          if [[ "${ref_name}" != ${prefix}* ]]; then
            echo "Tag '${ref_name}' does not start with prefix '${prefix}'" >&2
            exit 1
          fi
          version="${ref_name#${prefix}}"
          echo "tag=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.vars.outputs.version }}
            type=raw,value=latest

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag