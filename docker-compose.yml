services:
  foundryvtt:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE_VERSION: 24-bookworm-slim
        FVTT_VERSION: 14.161
        CONT_VERSION: local
    image: foundryvtt-nodejs:local
    container_name: foundryvtt-local
    restart: unless-stopped
    ports:
      - "30000:30000"
    environment:
      TZ: America/New_York
      PUID: 1000
      PGID: 1000
      FVTT_VERSION: 14.161
      FVTT_KEEP_PRIOR_COPIES: 5
      FVTT_PORT: 30000
      FVTT_VERBOSE_LOGGING: "false"

      # Install source: either set this to a timed URL, or pre-seed /data/InstallerCache
      FVTT_RELEASE_URL: ""

      # You can set these directly, but secrets/bind-mounted secret files are better
      FVTT_ADMIN_PASSWORD: ""
      FVTT_LICENSE_KEY: ""

      # options.json mapping
      FVTT_HOSTNAME: ""
      FVTT_ROUTE_PREFIX: ""
      FVTT_PROXY_SSL: "false"
      FVTT_PROXY_PORT: 443
      FVTT_MINIFY_STATIC_FILES: "true"
      FVTT_UPNP_ENABLED: "false"
      FVTT_COMPRESS_SOCKET: "false"
      FVTT_COMPRESS_STATIC: "false"
      FVTT_LANGUAGE: "en.core"
      FVTT_WORLD: ""

    volumes:
      - foundry_data:/data
      - foundry_logs:/logs
      - foundry_app:/foundryvtt

      # Optional non-Swarm secret bind mounts
      # - ./secrets/admin_password:/run/secrets/foundry_admin_password:ro
      # - ./secrets/license_key:/run/secrets/foundry_license_key:ro

    healthcheck:
      test: ["CMD", "/opt/foundry/scripts/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 3m
      retries: 3

volumes:
  foundry_data:
  foundry_logs:
  foundry_app: